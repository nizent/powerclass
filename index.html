<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portada Estilo Stripe</title>
  <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans antialiased overflow-x-hidden">

  <!-- Contenedor Principal con Fondo Complejo -->
  <main class="relative relative min-h-screen flex items-center justify-center pt-16">
    
    <!-- Efecto de Luces y Gradientes de Fondo -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none -z-10">
      <!-- Luz violeta superior -->
      <div class="absolute top-[-10%] left-[-20%] w-[80vw] h-[50vw] bg-violet-600/20 rounded-full blur-[120px] transform -rotate-12"></div>
      <!-- Luz azul/cyan central -->
      <div class="absolute top-[10%] right-[-10%] w-[60vw] h-[60vw] bg-cyan-500/15 rounded-full blur-[140px]"></div>
    </div>

    <!-- Contenido Central -->
    <section class="max-w-6xl mx-auto px-6 text-center lg:text-left grid lg:grid-cols-12 gap-12 items-center">
      
      <!-- Textos y Acciones -->
      <div class="lg:col-span-7 space-y-6">
        <!-- Tag Superior -->
        <span class="inline-flex items-center gap-2 px-3 py-1 text-xs font-medium text-cyan-400 bg-cyan-500/10 rounded-full border border-cyan-500/20">
          Novedad: Versión 2.0 ya disponible
        </span>
        
        <!-- Título Principal con Impacto -->
        <h1 class="text-5xl lg:text-7xl font-extrabold tracking-tight leading-tight">
          La infraestructura <br />
          <span class="bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 via-indigo-400 to-violet-500">
            para tu negocio.
          </span>
        </h1>
        
        <!-- Descripción Breve -->
        <p class="text-lg text-slate-400 max-w-xl mx-auto lg:mx-0">
          Clona este template estático, personaliza los textos y despliega en minutos. Diseñado para ofrecer la máxima conversión y velocidad.
        </p>
        
        <!-- Botones de Acción (CTAs) -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start pt-4">
          <a href="#" class="px-6 py-3 bg-white text-slate-900 font-semibold rounded-lg shadow-md hover:bg-slate-100 transition-all flex items-center justify-center gap-2 group">
            Comenzar ahora
            <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
          </a>
          <a href="#" class="px-6 py-3 bg-slate-800 text-slate-300 font-semibold rounded-lg hover:bg-slate-700 border border-slate-700 transition-all">
            Contactar ventas
          </a>
        </div>
      </div>

      <!-- Previsualización Visual (Placeholder de Tarjeta/Dashboard) -->
      <div class="lg:col-span-5 relative">
        <div class="relative mx-auto w-full max-w-[400px] aspect-[4/3] bg-gradient-to-tr from-slate-800 to-slate-850 rounded-2xl border border-slate-700/50 shadow-2xl p-6 overflow-hidden backdrop-blur-md">
          <!-- Efecto de brillo en la tarjeta -->
          <div class="absolute top-0 right-0 w-24 h-24 bg-white/5 rounded-full blur-xl"></div>
          <!-- Elementos simulados del dashboard -->
          <div class="h-4 w-1/3 bg-slate-700 rounded mb-6"></div>
          <div class="space-y-3">
            <div class="h-8 w-full bg-slate-800 rounded border border-slate-700/40"></div>
            <div class="h-8 w-5/6 bg-slate-800 rounded border border-slate-700/40"></div>
            <div class="h-8 w-4/6 bg-slate-800 rounded border border-slate-700/40"></div>
          </div>
        </div>
      </div>

    </section>
  </main>

</body>
</html>
